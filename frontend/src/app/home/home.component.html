  <h2>Ürünlerimiz</h2>
  <div class="row">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4" *ngFor="let p of products">
      <div class="card">
        <img [src]="p.imageUrl" alt="{{ p.name }}" class="card-img-top" style="height: 300px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{ p.name }}</h5>
          <p>{{ p.price }}</p>
          <button class="btn btn-info">Sepete Ekle</button>
        </div>
      </div>
    </div>
  </div>
